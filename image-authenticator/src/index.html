<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Image Authenticator</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    #result { margin-top: 20px; font-weight: bold; }
    button { margin-top: 10px; padding: 5px 15px; }
  </style>
</head>
<body>
  <h1>Upload an image</h1>
  <form id="upload-form">
    <input type="file" id="file-input" accept="image/*" required />
    <br />
    <button type="submit">Predict</button>
  </form>
  <div id="result"></div>

  <script>
    const form = document.getElementById('upload-form');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById('file-input');
      const file = fileInput.files[0];
      if (!file) {
        resultDiv.textContent = 'Please select a file!';
        return;
      }

      const formData = new FormData();
      formData.append('image', file);  // <-- MUST match FastAPI parameter name

      resultDiv.textContent = 'Predicting...';

      try {
        const response = await fetch('http://127.0.0.1:8000/predict', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        resultDiv.textContent = `Prediction: ${data.label} (Confidence: ${data.confidence}%)`;
      } catch (err) {
        console.error(err);
        resultDiv.textContent = 'Error occurred. Make sure FastAPI is running and CORS is enabled.';
      }
    });
  </script>
</body>
</html>
